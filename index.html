<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chappyn.pl - Oficjalna Strona Serwera</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent-color: #5865F2; 
            --curseforge-color: #F16436; 
            --text-color: #f5f5f7;
            --text-muted: #a0a0a5;
            --online-color: #2ecc71;
            --offline-color: #e74c3c;
            --admin-color: #9b59b6;
        }

        * {
            cursor: url('https://cdn.cursors-4u.net/previews/weed-marijuana-6fcfb5e6-32.webp') 32 32, auto !important;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden; 
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px 20px;
            width: 100%;
            background: linear-gradient(180deg, rgba(88,101,242,0.1) 0%, rgba(18,18,20,0) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .server-logo {
            width: 120px;
            height: 120px;
            border-radius: 0; 
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7); 
            /* Ramka usunięta */
        }

        header h1 { font-size: 3rem; margin: 0; }
        header p { color: var(--text-muted); font-size: 1.2rem; margin-top: 10px; }

        .container { max-width: 1000px; width: 90%; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 50px; }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .card h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-bottom: 20px; }

        .status-badge { padding: 5px 12px; border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .status-online { background-color: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status-offline { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        
        .status-high { 
            background-color: rgba(155, 89, 182, 0.2); 
            color: #9b59b6; 
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .admin-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: space-between; }
        .admin-photo { width: 45px; height: 45px; border: 2px solid #000; object-fit: cover; }
        .ip-box { background-color: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; text-align: center; font-family: monospace; font-size: 1.3rem; font-weight: bold; color: var(--accent-color); border: 1px dashed rgba(88,101,242,0.3); margin-top: 10px; }
        .btn-curseforge { background-color: #F16436; color: white; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin-top: 15px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="server-logo">
        <h1>chappyn.pl</h1>
        <p>Witaj na oficjalnej stronie naszego serwera!</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Status Serwera</h2>
            <p>Stan serwera: <span id="server-status" class="status-badge status-offline">Ładowanie...</span></p>
            <p>Gracze: <span id="player-count">- / -</span></p>
            <div class="ip-box" id="ip-address" onclick="copyIP()">chappyn.pl</div>
        </div>

        <div class="card">
            <h2>Paczka Modów</h2>
            <a href="https://www.curseforge.com/minecraft/modpacks/chappyn" target="_blank" class="btn-curseforge">Pobierz Modpack</a>
            <div class="admin-section">
                <span>Stan admina:</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="admin.png" alt="Admin" class="admin-photo">
                    <span class="status-high">zjarany xddd</span>
                </div>
            </div>
        </div>

        <div class="card full-width">
            <h2>Jak zainstalować mody?</h2>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/S9Sl-c166Z0"></iframe>
            </div>
        </div>
    </div>

    <script>
        async function fetchServerStatus() {
            try {
                const res = await fetch('https://mcapi.us/server/status?ip=chappyn.pl');
                const data = await res.json();
                if (data.online) {
                    document.getElementById('server-status').textContent = "Online";
                    document.getElementById('server-status').className = "status-badge status-online";
                    document.getElementById('player-count').textContent = `${data.players.now} / ${data.players.max}`;
                }
            } catch (e) { console.error(e); }
        }
        function copyIP() { navigator.clipboard.writeText('chappyn.pl'); alert("Skopiowano IP!"); }
        fetchServerStatus();
    </script>
</body>
</html>
